version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  - /sandbox/.openclaw
  read_write:
  - /sandbox
  - /tmp
  - /dev/null
  - /sandbox/.openclaw-data
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  # --- Host-local endpoints (plain HTTP, no CONNECT needed) ---
  browser_cdp:
    name: browser_cdp
    endpoints:
    - host: host.openshell.internal
      port: 9223
      access: full
      allowed_ips:
      - '192.168.65.254'
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
    - path: /usr/bin/curl
  litellm:
    name: litellm
    endpoints:
    - host: host.openshell.internal
      port: 4000
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: '*'
          path: /**
      allowed_ips:
      - '192.168.65.254'
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/local/bin/openclaw
    - path: /usr/bin/curl
  ollama_local:
    name: ollama_local
    endpoints:
    - host: host.openshell.internal
      port: 11434
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: '*'
          path: /**
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/local/bin/openclaw
  # --- External HTTPS endpoints (access: full to avoid CONNECT binary
  #     identity bug, OpenShell #1471) ---
  claude_code:
    name: claude_code
    endpoints:
    - host: api.anthropic.com
      port: 443
      access: full
    - host: statsig.anthropic.com
      port: 443
      access: full
    - host: sentry.io
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/claude
  clawhub:
    name: clawhub
    endpoints:
    - host: clawhub.ai
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
  discord:
    name: discord
    endpoints:
    - host: discord.com
      port: 443
      access: full
    - host: gateway.discord.gg
      port: 443
      access: full
    - host: cdn.discordapp.com
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/node
  github:
    name: github
    endpoints:
    - host: github.com
      port: 443
      access: full
    - host: api.github.com
      port: 443
      access: full
    binaries:
    - path: /usr/bin/gh
    - path: /usr/bin/git
  google_gemini:
    name: google_gemini
    endpoints:
    - host: generativelanguage.googleapis.com
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
    - path: /usr/bin/curl
  npm_registry:
    name: npm_registry
    endpoints:
    - host: registry.npmjs.org
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/npm
    - path: /usr/local/bin/node
  nvidia:
    name: nvidia
    endpoints:
    - host: integrate.api.nvidia.com
      port: 443
      access: full
    - host: inference-api.nvidia.com
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/local/bin/openclaw
  openclaw_api:
    name: openclaw_api
    endpoints:
    - host: openclaw.ai
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
  openclaw_docs:
    name: openclaw_docs
    endpoints:
    - host: docs.openclaw.ai
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
  telegram:
    name: telegram
    endpoints:
    - host: api.telegram.org
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/node
  # --- Web search / fetch (agent tools hit arbitrary domains) ---
  # Pre-approve common search engines and news sources so web_search
  # and web_fetch work immediately without waiting for rule approval.
  web_search:
    name: web_search
    endpoints:
    - host: www.google.com
      port: 443
      access: full
    - host: google.com
      port: 443
      access: full
    - host: www.bing.com
      port: 443
      access: full
    - host: duckduckgo.com
      port: 443
      access: full
    - host: html.duckduckgo.com
      port: 443
      access: full
    - host: lite.duckduckgo.com
      port: 443
      access: full
    - host: search.brave.com
      port: 443
      access: full
    - host: api.search.brave.com
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
    - path: /usr/bin/curl
  web_fetch:
    name: web_fetch
    endpoints:
    - host: www.reuters.com
      port: 443
      access: full
    - host: apnews.com
      port: 443
      access: full
    - host: www.bbc.com
      port: 443
      access: full
    - host: www.espn.com
      port: 443
      access: full
    - host: espn.com
      port: 443
      access: full
    - host: www.cyclingnews.com
      port: 443
      access: full
    - host: www.velonews.com
      port: 443
      access: full
    - host: www.denverpost.com
      port: 443
      access: full
    - host: kdvr.com
      port: 443
      access: full
    - host: www.9news.com
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
    - path: /usr/bin/curl
  wttr_in:
    name: wttr_in
    endpoints:
    - host: wttr.in
      port: 443
      access: full
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
